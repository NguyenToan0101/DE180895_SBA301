# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.servlet.context-path=/

# ============================================
# DATASOURCE CONFIGURATION (SQL Server)
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FUNewsManagementSystem;encrypt=true;trustServerCertificate=true;characterEncoding=UTF-8
spring.datasource.username=nguyentoan
spring.datasource.password=congtoan0101
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# Validate schema (kh¶ng t? ??ng t?o/s?a b?ng vņ ?Ń t?o th? c¶ng)
spring.jpa.hibernate.ddl-auto=update
# Hi?n th? SQL queries trong console (t?t trong production)
spring.jpa.show-sql=true
# Format SQL queries cho d? ??c
spring.jpa.properties.hibernate.format_sql=true
# Dialect cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Connection Pool Configuration (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000



# Naming strategy: gi? nguyĻn tĻn b?ng vÓ c?t nh? trong Entity
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ============================================
# LOGGING CONFIGURATION
# ============================================
# Log level cho Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Log level cho Spring
logging.level.org.springframework.web=INFO
logging.level.com.example.Assigment2=DEBUG

# ============================================
# JSON CONFIGURATION
# ============================================
# Format dates trong JSON response
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC
# Kh¶ng tr? v? null values trong JSON
spring.jackson.default-property-inclusion=NON_NULL
# Encoding UTF-8 cho JSON
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


# ============================================
# CORS CONFIGURATION (n?u kh¶ng d∙ng WebConfig)
# ============================================
# spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# spring.web.cors.allowed-headers=*
# spring.web.cors.allow-credentials=true

# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=FUNewsManagementSystem

# ============================================
# ERROR HANDLING
# ============================================
# Hi?n th? error details (t?t trong production)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
